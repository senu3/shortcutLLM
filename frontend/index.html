<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Clipboard Assistant</title>
    <link rel="stylesheet" href="/src/app.css">
    <script type="module" src="/src/main.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Header / Nav -->
        <header class="navbar">
            <div class="brand">ShortcutLLM</div>
            <div class="controls">
                <select id="provider-dropdown" class="dropdown"></select>
                <select id="model-dropdown" class="dropdown"></select>
                <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main id="main-view">
            <!-- Top: Clipboard Text Area -->
            <div class="editor-area">
                <textarea id="clipboard-text" placeholder="Clipboard content will appear here..."></textarea>
            </div>

            <!-- Middle: Action Buttons -->
            <div class="action-bar">
                <button id="save-btn" class="btn btn-primary">Save to Clipboard</button>
                <button id="send-btn" class="btn btn-accent">Send to AI</button>
            </div>

            <!-- Bottom: AI Response -->
            <div id="response-area" class="response-area">
                <div id="response-content" class="markdown-body">
                    <!-- Response goes here -->
                </div>
            </div>
        </main>

        <!-- Settings Modal (Hidden by default) -->
        <div id="settings-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Settings</h3>
                <form id="settings-form">
                    <div class="form-group">
                        <label>Model Name</label>
                        <input id="model-input" type="text" />
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input id="api-base-url-input" type="text" />
                    </div>
                    <!-- Hidden API Key Input if needed, or just let user configure via env vars/file if preferred, but adhering to existing logic -->
                    <div class="form-group" style="display:none"> 
                        <label>API Key</label>
                        <input id="api-key-input" type="password" />
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="close-settings-btn" class="btn">Close</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
