<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AIチャット</title>
    <link rel="stylesheet" href="https://unpkg.com/chota">
    <link rel="stylesheet" href="/src/app.css">
    <style>
        body {
            font-family: sans-serif;
            background: #fafafa;
            margin: 20px;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .dropdown-inline {
            padding: 6px;
        }

        #aiwindow {
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 16px #0001;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        #prompt {
            flex: 1;
            padding: 6px;
        }

        #send {
            padding: 6px 12px;
        }

        #response {
            margin-top: 12px;
            background: #f0f0ff;
            min-height: 60px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="nav-left">
            <a id="tab-main" class="brand">shortcutLLM</a>

            <select id="provider-dropdown" class="dropdown-inline">
                <!-- JSで埋めます -->
            </select>

            <select id="model-dropdown" class="dropdown-inline">
                <!-- JSで埋めます -->
            </select>
        </div>

        <div>
            <a id="tab-settings" title="設定" style="cursor:pointer;">⚙️</a>
        </div>
    </nav>

    <div id="aiwindow">
        <div id="main-view">
            <div class="row">
                <input id="prompt" type="text" placeholder="プロンプトを入力…" />
                <button id="send">送信</button>
            </div>
            <div id="response">ここに回答が表示されます</div>
        </div>

        <div id="settings-view" style="display:none;">
            <form id="settings-form">
                <div class="row">
                    <label style="width:100px">モデル名</label>
                    <input id="model" type="text" style="flex:1" />
                </div>
                <div class="row">
                    <label style="width:100px">APIエンドポイント</label>
                    <input id="apibaseurl" type="text" style="flex:1" />
                </div>
                <div class="row">
                    <button type="submit">保存</button>
                </div>
            </form>
        </div>

    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
